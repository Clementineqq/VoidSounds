root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  bin = "./tmp/main.exe"
  full_bin = "./tmp/main.exe"

  include_ext = ["go", "templ", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "benchdata", ".git"]
  exclude_regex = ["_test.go", ".*_templ.go"]
  exclude_unchanged = false

  kill_delay = "100ms"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true